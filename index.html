  <body>
    <header class="site-header">
      <div class="shell header-inner">
        <a href="#" class="brand" aria-label="Community Organization Home">
          <img src="logo.png" alt="Community logo" class="brand-logo" />
        </a>
        <button
          id="navToggle"
          class="nav-toggle"
          type="button"
          aria-label="Toggle navigation"
          aria-expanded="false"
          aria-controls="mainNav"
        >
          ☰
        </button>
        <nav id="mainNav" class="main-nav">
          <button
            class="nav-link active"
            data-page="home"
            data-en="Home"
            data-fr="Accueil"
          >
            Home
          </button>
          <button
            class="nav-link"
            data-page="projects"
            data-en="Projects"
            data-fr="Projets"
          >
            Projects
          </button>
          <button
            class="nav-link"
            data-page="resources"
            data-en="Useful Links"
            data-fr="Liens Utiles"
          >
            Useful Links
          </button>
          <button
            class="nav-link contact-link"
            data-page="contact"
            data-scroll="contact"
            data-en="Contact"
            data-fr="Contact"
          >
            Contact
          </button>
          <button
            class="nav-btn nav-btn-primary"
            data-page="contact"
            data-en="Contact"
            data-fr="Contact"
          >
            Join Us
          </button>
          <button
            class="btn btn-secondary"
            data-page="about"
            data-scroll="about"
            data-en="about"
            data-fr="about"
          >
            Learn More
          </button>
          <button id="langSwitch" class="lang-switch">FR</button>
        </nav>
      </div>
    </header>

    <main id="app"></main>

    <footer class="site-footer">
      <div class="shell footer-inner">
        <div class="footer-top">
          <img src="./logo.png" alt="Community logo" class="footer-logo" />
          <div>
            <h4 class="follow-us">Follow Us</h4>
            <a href="https://www.facebook.com/" class="footer-social-icon"
              ><img
                src="./icons/facebook.png"
                alt="Community logo"
                class="footer-logo"
            /></a>
            <a href="https://twitter.com/" class="footer-social-icon"
              ><img
                src="./icons/x.png"
                alt="Community logo"
                class="footer-logo"
            /></a>
          </div>
        </div>
        <p id="footerText">© 2026 HCBE. All rights reserved.</p>
      </div>
    </footer>

                url: "https://kingcounty.gov/en/dept/dph",
              },
              {
                category: "Bénévolat",
                title: "VolunteerMatch Seattle",
                text: "Parcourez les opportunités de bénévolat disponibles à Seattle.",
                url: "https://www.volunteermatch.org/search?l=Seattle%2C+WA%2C+USA",
              },
              {
                category: "Aide Communautaire",
                title: "WA 211",
                text: "Trouvez des services de logement, alimentation, factures, santé et autres soutiens partout dans l’État de Washington.",
                url: "https://wa211.org/",
              },
            ],
          },
        };

        const members = Array.from({ length: 14 }, (_, i) => ({
          name: `Member ${i + 1}`,
          image: `members/member${i + 1}.svg`,
        }));

        function memberCards(t) {
          return members
            .map(
              (member, index) => `
      <article class="member-card">
        <div class="member-image-wrap">
          <img src="${member.image}" alt="${member.name}" class="member-image" />
        </div>
        <h3>${member.name}</h3>
        <p>${t.roles[index] || ""}</p>
      </article>
    `,
            )
            .join("");
        }

        function projectsCards(t) {
          return t.projects
            .map(
              (project) => `
      <article class="project-card">
        <div class="project-icon"><img src="${project.icon}" alt="Project Icon" /></div>
        <h3>${project.title}</h3>
        <p>${project.text}</p>
      </article>
    `,
            )
            .join("");
        }

        function resourcesCards(t) {
          return t.resources
            .map(
              (resource) => `
      <article class="resource-card">
        <div>
          <p class="resource-category">${resource.category}</p>
          <h3>${resource.title}</h3>
          <p class="resource-description">${resource.text}</p>
          </div>
          <a class="resource-link" href="${resource.url}" target="_blank" rel="noopener noreferrer">${t.openResource}</a>

      </article>
    `,
            )
            .join("");
        }

        function renderHome(t) {
          app.innerHTML = `
      <section class="hero-section">
        <div class="shell hero-grid">
          <div class="hero-copy">
            
            <h1>${t.heroTitle}</h1>
            <p>${t.heroText}</p>
            
          </div>
         
        </div>
      </section>

      <section id="about" class="section">
        <div class="shell narrow-center">
          <span class="section-kicker">About</span>
          <h2>${t.aboutTitle}</h2>
          <div class="title-accent"></div>
          <p class="section-text">${t.aboutText}</p>
        </div>
      </section>

      <section class="section section-soft">
        <div class="shell">
          <div class="section-head">
            <div>
              <span class="section-kicker">Leadership</span>
              <h2>${t.membersTitle}</h2>
            </div>
            <p>${t.membersText}</p>
          </div>
          <div class="members-grid">${memberCards(t)}</div>
        </div>
      </section>
    `;
        }

        function renderProjects(t) {
          app.innerHTML = `
      <section class="page-banner">
        <div class="shell narrow-center">
          <span class="section-kicker">Community Work</span>
          <h1>${t.projectsTitle}</h1>
          <p class="section-text">${t.contactText}</p>
        </div>
      </section>

      <section class="section ">
        <div class="shell projects-section">
          <div class="project-grid">${projectsCards(t)}</div>
        </div>
      </section>
    `;
        }

        function renderResources(t) {
          app.innerHTML = `
      <section class="page-banner resources-section">
        <div class="shell narrow-center">
            <span class="section-kicker">${t.resourcesKicker}</span>
            <h1>${t.resourcesTitle}</h1>
            <p class="section-text ">${t.resourcesText}</p>
         
        </div>
      </section>
       <section class="section">
        <div class="shell">
          <div class="resources-grid">${resourcesCards(t)}</div>
        </div>
      </section>
    `;
        }

        function renderContact(t) {
          app.innerHTML = `
      <section class="page-banner">
        <div class="shell narrow-center">
          <span class="section-kicker">Get in Touch</span>
          <h1>${t.contactTitle}</h1>
          <p class="section-text">${t.contactText}</p>
        </div>
      </section>

      <section id="contact" class="section section-soft">
        <div class="shell contact-grid">
          <div>
            <span class="section-kicker">Get in Touch</span>
            <h2>${t.contactTitle}</h2>
            <div class="title-accent"></div>
            <p class="section-text left-text">${t.contactText}</p>
          </div>
          <form class="contact-card" onsubmit="event.preventDefault()">
            <label>
              <span>${t.name}</span>
              <input type="text" placeholder="${t.name}" />
            </label>
            <label>
              <span>${t.email}</span>
              <input type="email" placeholder="${t.email}" />
            </label>
            <label class="full-width">
              <span>${t.message}</span>
              <textarea rows="5" placeholder="${t.message}"></textarea>
            </label>
            <button class="btn btn-primary full-width" type="submit">${t.send}</button>
          </form>
        </div>
      </section>
    `;
        }

        function updateNavLabels() {
          const t = translations[lang];
          document.querySelectorAll(".nav-link").forEach((btn) => {
            if (btn.dataset.page === "home") btn.textContent = t.navHome;
            if (btn.dataset.page === "projects")
              btn.textContent = t.navProjects;
            if (btn.dataset.page === "resources")
              btn.textContent = t.navResources;
            if (btn.dataset.page === "contact") btn.textContent = t.navContact;
          });
          footerText.textContent = t.footer;
          langSwitch.textContent = lang === "en" ? "FR" : "EN";
          document.querySelectorAll(".nav-link").forEach((btn) => {
            btn.classList.toggle("active", btn.dataset.page === currentPage);
          });
        }

        function render() {
          const t = translations[lang];
          if (currentPage === "projects") renderProjects(t);
          else if (currentPage === "resources") renderResources(t);
          else if (currentPage === "contact") renderContact(t);
          else renderHome(t);
          updateNavLabels();
        }

        function bindPageButtons() {
          if (bindPageButtons.isBound) return;

          document.addEventListener("click", function (event) {
            const el = event.target.closest("[data-page]");
            if (!el) return;

            const nextPage = el.dataset.page;
            currentPage = nextPage === "about" ? "home" : nextPage;
            render();

            if (siteHeader.classList.contains("menu-open")) {
              siteHeader.classList.remove("menu-open");
              navToggle.setAttribute("aria-expanded", "false");
              navToggle.textContent = "☰";
            }

            if (el.dataset.scroll) {
              setTimeout(() => {
                const target = document.getElementById(el.dataset.scroll);
                if (target) target.scrollIntoView({ behavior: "smooth" });
              }, 0);
            } else {
              window.scrollTo({ top: 0, behavior: "smooth" });
            }
          });

          bindPageButtons.isBound = true;
        }

        navToggle.addEventListener("click", function () {
          const isOpen = siteHeader.classList.toggle("menu-open");
          navToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
          navToggle.textContent = isOpen ? "✕" : "☰";
        });

        window.addEventListener("resize", function () {
          if (window.innerWidth > 720 && siteHeader.classList.contains("menu-open")) {
            siteHeader.classList.remove("menu-open");
            navToggle.setAttribute("aria-expanded", "false");
            navToggle.textContent = "☰";
          }
        });

        langSwitch.addEventListener("click", function () {
          lang = lang === "en" ? "fr" : "en";
          localStorage.setItem("lang", lang);
          render();
        });

        bindPageButtons();
        render();
      })();
    </script>
  </body>
</html>
