<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>H.C.B.E Community Organization</title>
    <meta name="description" content="Community organization website" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="shell header-inner">
        <a href="#" class="brand" aria-label="Community Organization Home">
          <img src="logo.png" alt="Community logo" class="brand-logo" />
        </a>
        <nav class="main-nav">
          <button
            class="nav-link active"
            data-page="home"
            data-en="Home"
            data-fr="Accueil"
          >
            Home
          </button>
          <button
            class="nav-link"
            data-page="projects"
            data-en="Projects"
            data-fr="Projets"
          >
            Projects
          </button>
          <button
            class="nav-link contact-link"
            data-page="projects"
            data-scroll="contact"
            data-en="Contact"
            data-fr="Contact"
          >
            Contact
          </button>
          <button id="langSwitch" class="lang-switch">FR</button>
        </nav>
      </div>
    </header>

    <main id="app"></main>

    <footer class="site-footer">
      <div class="shell footer-inner">
        <div class="footer-top">
          <img src="./logo.png" alt="Community logo" class="footer-logo" />
          <div>
            <h4 class="follow-us">Follow Us</h4>
            <a href="https://www.facebook.com/" class="footer-social-icon"
              ><img
                src="./icons/facebook.png"
                alt="Community logo"
                class="footer-logo"
            /></a>
            <a href="https://twitter.com/" class="footer-social-icon"
              ><img
                src="./icons/x.png"
                alt="Community logo"
                class="footer-logo"
            /></a>
          </div>
        </div>
        <p id="footerText">© 2026 HCBE. All rights reserved.</p>
      </div>
    </footer>

    <script>
      (function () {
        const app = document.getElementById("app");
        const langSwitch = document.getElementById("langSwitch");
        const footerText = document.getElementById("footerText");
        let lang =
          localStorage.getItem("lang") ||
          ((navigator.language || "en").toLowerCase().startsWith("fr")
            ? "fr"
            : "en");
        let currentPage = "home";

        const translations = {

            projectsTitle: "Our Projects",
            resourcesKicker: "Resources",
            resourcesTitle: "Useful Links",

              "We would love to hear from you. Reach out to learn more about events, partnerships, volunteering, or community support.",
            name: "Name",
            email: "Email",

            openResource: "Open resource",

              },
              {
                icon: "./icons/education.png",
                title: "Youth Education",

              },
              {
                icon: "./icons/12431690.png",

                text: "Celebrations, performances, and public gatherings that highlight heritage, unity, and shared identity.",
              },
            ],
            resources: [
              {
                category: "Community Calendar",

              },
              {
                category: "Library & Learning",

              },
              {

              {

              {

              },

          },
          fr: {
            navHome: "Accueil",
            navProjects: "Projets",
            navContact: "Contact",
            heroTitle: "Haut Conseil des Burkinabè de l'extérieur .",
            heroText:
              "Nous sommes une organisation communautaire engagée pour l’unité, le service, la jeunesse et la valorisation culturelle au sein de notre communauté.",
            heroPrimary: "Nous rejoindre",
            heroSecondary: "En savoir plus",
            aboutTitle: "À Propos",
            aboutText:
              "Notre organisation rassemble des membres, des familles et des bénévoles engagés qui croient au service, à l’éducation, à la solidarité et à la fierté culturelle. Nous créons des programmes utiles qui renforcent les liens communautaires et soutiennent la nouvelle génération.",
            membersTitle: "Nos Membres",
            membersText:
              "Une équipe de quatorze membres engagés qui dirigent les actions de proximité, les événements, les initiatives jeunesse, la communication, la logistique et l’engagement communautaire.",
            projectsTitle: "Nos Projets",
            resourcesKicker: "Ressources",
            resourcesTitle: "Liens Utiles",
            resourcesText:
              "Un espace de ressources avec des liens externes vers des événements communautaires, l’apprentissage, les services publics, le bénévolat, les arts et les services de soutien.",
            contactTitle: "Contactez-Nous",
            contactText:
              "Nous serions ravis d’avoir de vos nouvelles. Contactez-nous pour les événements, les partenariats, le bénévolat ou le soutien communautaire.",
            name: "Nom",
            email: "E-mail",
            message: "Message",
            send: "Envoyer",
            openResource: "Ouvrir la ressource",
            footer: "© 2026 Organisation Communautaire. Tous droits réservés.",
            roles: [
              "Président",
              "Vice-Président",
              "Secrétaire",
              "Trésorier",
              "Responsable Communautaire",
              "Coordonnateur Jeunesse",
              "Responsable Communication",
              "Directeur des Événements",
              "Coordonnateur des Bénévoles",
              "Responsable des Programmes",
              "Responsable du Soutien Familial",
              "Responsable Culturel",
              "Coordonnateur Logistique",
              "Responsable Médias et Communication",
            ],
            projects: [
              {
                icon: "./icons/colabrate.png",
                title: "Action Communautaire",
                text: "Des initiatives locales, des partenariats communautaires et des programmes centrés sur les familles pour créer des liens durables.",
              },
              {
                icon: "./icons/education.png",
                title: "Éducation des Jeunes",
                text: "Mentorat, accompagnement scolaire, apprentissage culturel et activités favorisant la croissance et le leadership.",
              },
              {
                icon: "./icons/12431690.png",
                title: "Événements Culturels",
                text: "Célébrations, performances et rassemblements publics mettant en valeur l’héritage, l’unité et l’identité commune.",
              },
            ],
            resources: [
              {
                category: "Calendrier Communautaire",
                title: "Calendrier des événements de Seattle Center",
                text: "Consultez les événements communautaires et culturels à venir dans le calendrier officiel de Seattle Center.",
                url: "https://www.seattlecenter.com/events/event-calendar",
              },
              {
                category: "Bibliothèque & Apprentissage",
                title: "Bibliothèque publique de Seattle",
                text: "Accédez gratuitement à des livres, des cours, des ressources en ligne et des programmes via la bibliothèque publique de Seattle.",
                url: "https://www.spl.org/",
              },
              {
                category: "Carte de Bibliothèque",
                title: "Obtenir une carte SPL",
                text: "Faites une demande en ligne pour une carte gratuite de la bibliothèque publique de Seattle si vous vivez, travaillez ou étudiez à Seattle.",
                url: "https://www.spl.org/using-the-library/get-started/get-started-in-english/en-get-started-with-a-library-card",
              },
              {
                category: "Avantages & Services",
                title: "Washington Connection",
                text: "Trouvez et demandez les avantages et services de l’État de Washington via le portail officiel.",
                url: "https://www.washingtonconnection.org/",
              },
              {
                category: "Ressources Santé",
                title: "Santé publique – Seattle & King County",
                text: "Trouvez les centres de santé publique, services, programmes et informations de sécurité pour King County.",
                url: "https://kingcounty.gov/en/dept/dph",
              },
              {
                category: "Bénévolat",
                title: "VolunteerMatch Seattle",
                text: "Parcourez les opportunités de bénévolat disponibles à Seattle.",
                url: "https://www.volunteermatch.org/search?l=Seattle%2C+WA%2C+USA",
              },
              {
                category: "Aide Communautaire",
                title: "WA 211",
                text: "Trouvez des services de logement, alimentation, factures, santé et autres soutiens partout dans l’État de Washington.",
                url: "https://wa211.org/",
              },
            ],
          },
        };

        const members = Array.from({ length: 14 }, (_, i) => ({
          name: `Member ${i + 1}`,
          image: `members/member${i + 1}.svg`,
        }));

        function memberCards(t) {
          return members
            .map(
              (member, index) => `
      <article class="member-card">
        <div class="member-image-wrap">
          <img src="${member.image}" alt="${member.name}" class="member-image" />
        </div>
        <h3>${member.name}</h3>
        <p>${t.roles[index] || ""}</p>
      </article>
    `,
            )
            .join("");
        }

        function projectsCards(t) {
          return t.projects
            .map(
              (project) => `
      <article class="project-card">
        <div class="project-icon"><img src="${project.icon}" alt="Project Icon" /></div>
        <h3>${project.title}</h3>
        <p>${project.text}</p>
      </article>
    `,
            )
            .join("");
        }

        function resourcesCards(t) {
          return t.resources
            .map(
              (resource) => `
      <article class="resource-card">
        <div>
          <p class="resource-category">${resource.category}</p>
          <h3>${resource.title}</h3>
          <p class="resource-description">${resource.text}</p>
          </div>
          <a class="resource-link" href="${resource.url}" target="_blank" rel="noopener noreferrer">${t.openResource}</a>

      </article>
    `,
            )
            .join("");
        }

        function renderHome(t) {
          app.innerHTML = `
      <section class="hero-section">
        <div class="shell hero-grid">
          <div class="hero-copy">
            
            <h1>${t.heroTitle}</h1>
            <p>${t.heroText}</p>
            <div class="hero-actions">
              <button class="btn btn-primary" data-page="projects" data-scroll="contact">${t.heroPrimary}</button>
              <a href="#about" class="btn btn-secondary">${t.heroSecondary}</a>
            </div>
          </div>
          <div class="hero-visual" aria-hidden="true">
            <div class="hero-card">
             
              <div class="visual-circle circle-red"></div>
              <div class="visual-circle circle-green"></div>
              <div class="visual-circle circle-gold"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="about" class="section">
        <div class="shell narrow-center">
          <span class="section-kicker">About</span>
          <h2>${t.aboutTitle}</h2>
          <div class="title-accent"></div>
          <p class="section-text">${t.aboutText}</p>
        </div>
      </section>

      <section class="section section-soft">
        <div class="shell">
          <div class="section-head">
            <div>
              <span class="section-kicker">Leadership</span>
              <h2>${t.membersTitle}</h2>
            </div>
            <p>${t.membersText}</p>
          </div>
          <div class="members-grid">${memberCards(t)}</div>
        </div>
      </section>
    `;
          bindPageButtons();
        }

        function renderProjects(t) {
          app.innerHTML = `
      <section class="page-banner">
        <div class="shell narrow-center">
          <span class="section-kicker">Community Work</span>
          <h1>${t.projectsTitle}</h1>
          <p class="section-text">${t.contactText}</p>
        </div>
      </section>

      <section class="section">
        <div class="shell">
          <div class="project-grid">${projectsCards(t)}</div>
        </div>
      </section>

      <section class="section resources-section">
        <div class="shell">
          <div class="resources-head">
            <span class="section-kicker">${t.resourcesKicker}</span>
            <h2>${t.resourcesTitle}</h2>
            <p class="section-text left-text">${t.resourcesText}</p>
          </div>
          <div class="resources-grid">${resourcesCards(t)}</div>
        </div>
      </section>

      <section id="contact" class="section section-soft">
        <div class="shell contact-grid">
          <div>
            <span class="section-kicker">Get in Touch</span>
            <h2>${t.contactTitle}</h2>
            <div class="title-accent"></div>
            <p class="section-text left-text">${t.contactText}</p>
          </div>
          <form class="contact-card" onsubmit="event.preventDefault()">
            <label>
              <span>${t.name}</span>
              <input type="text" placeholder="${t.name}" />
            </label>
            <label>
              <span>${t.email}</span>
              <input type="email" placeholder="${t.email}" />
            </label>
            <label class="full-width">
              <span>${t.message}</span>
              <textarea rows="5" placeholder="${t.message}"></textarea>
            </label>
            <button class="btn btn-primary full-width" type="submit">${t.send}</button>
          </form>
        </div>
      </section>
    `;
          bindPageButtons();
        }

        function updateNavLabels() {
          const t = translations[lang];
          document.querySelectorAll(".nav-link").forEach((btn) => {
            if (btn.dataset.page === "home") btn.textContent = t.navHome;
            if (
              btn.dataset.page === "projects" &&
              !btn.classList.contains("contact-link")
            )
              btn.textContent = t.navProjects;
            if (btn.classList.contains("contact-link"))
              btn.textContent = t.navContact;
          });
          footerText.textContent = t.footer;
          langSwitch.textContent = lang === "en" ? "FR" : "EN";
          document.querySelectorAll(".nav-link").forEach((btn) => {
            btn.classList.toggle(
              "active",
              btn.dataset.page === currentPage &&
                !btn.classList.contains("contact-link"),
            );
          });
        }

        function render() {
          const t = translations[lang];
          if (currentPage === "projects") renderProjects(t);
          else renderHome(t);
          updateNavLabels();
        }

        function bindPageButtons() {
          document.querySelectorAll("[data-page]").forEach((el) => {
            el.addEventListener("click", function () {
              currentPage = this.dataset.page;
              render();
              if (this.dataset.scroll === "contact") {
                setTimeout(() => {
                  const target = document.getElementById("contact");
                  if (target) target.scrollIntoView({ behavior: "smooth" });
                }, 0);
              } else {
                window.scrollTo({ top: 0, behavior: "smooth" });
              }
            });
          });
        }

        langSwitch.addEventListener("click", function () {
          lang = lang === "en" ? "fr" : "en";
          localStorage.setItem("lang", lang);
          render();
        });

        render();
      })();
    </script>
  </body>
</html>
